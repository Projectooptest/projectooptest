spring.application.name=Student-Course-Registration-System

# PostgreSQL Database Configuration
# These use Railway's default environment variables automatically when deployed,
# and fallback to 'localhost' for local development if not found.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:eduportal}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Initialize database with data.sql if needed
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# File upload paths
file.upload.path=uploads/payments/
file.upload.materials.path=uploads/materials/

# Multipart settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB