spring.application.name=Student-Course-Registration-System

# SQLite Database Configuration (persistent file-based database)
spring.datasource.url=jdbc:sqlite:./data/eduportal.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Initialize database with data.sql on first run
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# File upload paths
file.upload.path=uploads/payments/
file.upload.materials.path=uploads/materials/

# Multipart settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB